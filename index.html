<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery App</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>

<script type="module">
    import { carregarCardapio } from './js/api.js';
    carregarCardapio(); // Isso faz os lanches aparecerem na tela!
</script>

<body>
    <div class="container-principal">
        <header id="store-header">
            <div class="logo-container">
                <img src="assets/logo-kaka-lanches.png" id="store-logo" alt="Logo Loja">
            </div>
            <button id="menu-btn" class="material-symbols-outlined">
                menu <span class="menu-text">MENU</span>
            </button>
        </header>
    
        <main>
            <section class="search-box" style="padding: 20px;">
                <div id="categories-container" style="padding: 0 20px;">
                    <p>Quer repetir um pedido?</p>
                    <button class="btn-repeat">
                        <span class="material-symbols-outlined">refresh</span> Repetir
                    </button>
                </div>
                <input type="text" id="search-input" placeholder="Digite para buscar no cardápio...">
            </section>
    
            <div id="categories-container">
            </div>
        </main>
    
        <!-- Modal de Sucesso -->
        <div id="modal-sucesso" class="modal-alert">
            <div class="alert-content">
                <div class="icon-circle">
                    <span class="material-symbols-outlined">check</span>
                </div>
                <h2>Sucesso</h2>
                <p>Adicionado com sucesso ao carrinho!</p>
                <button onclick="fecharSucesso()" class="btn-ok">OK</button>
            </div>
        </div>
    
        <!-- Modal de Detalhes do Produto -->
        <div id="modal-detalhes" class="modal">
            <div class="modal-content">
                <header class="modal-header">
                    <button onclick="fecharModal()" class="btn-back">
                        <span class="material-symbols-outlined">arrow_back_ios</span>
                    </button>
                    <h3>Detalhes</h3>
                </header>
    
                <img src="" id="modal-img" alt="Produto">
    
                <div class="modal-body">
                    <h2 id="modal-titulo"></h2>
                    <p id="modal-descricao"></p>
    
                    <div class="modal-footer-acao">
                        <div class="qtd-control">
                            <button onclick="alterarQtd(-1)">-</button>
                            <input type="number" id="qtd-input" value="1" readonly>
                            <button onclick="alterarQtd(1)">+</button>
                        </div>
                        <button id="btn-adicionar-carrinho" class="btn-buy">
                            Adicionar <span id="modal-preco"></span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    
        <div id="modal-erro" class="modal-alert">
            <div class="alert-content">
                <div class="icon-circle error">
                    <span class="material-symbols-outlined">close</span>
                </div>
                <h2>Erro</h2>
                <p>Que pena, estamos fechados agora. Confira nosso horário de funcionamento!</p>
                <button onclick="fecharErro()" class="btn-error">OK</button>
            </div>
        </div>
    
        <section id="tela-carrinho" class="tela-cheia" style="display: none;">
            <header class="modal-header">
                <button onclick="fecharCarrinho()" class="btn-back">
                    <span class="material-symbols-outlined">arrow_back_ios</span>
                </button>
                <h3>Meu Carrinho</h3>
            </header>
    
            <div class="carrinho-itens" id="lista-itens-carrinho">
                </div>
    
            <div class="carrinho-resumo">
                <div class="resumo-linha">
                    <span>Subtotal</span>
                    <span id="resumo-subtotal">R$ 0,00</span>
                </div>
                <button class="btn-finalizar" onclick="finalizarPedido()">FECHAR PEDIDO</button>
                <button class="btn-limpar" onclick="limparCarrinho()">Limpar Carrinho</button>
            </div>
        </section>

    
        <footer id="cart-footer">
            <div class="cart-info">
                <div class="cart-badge">0</div>
                <span>VER CARRINHO</span>
            </div>
            <div class="cart-total">R$ 0,00</div>
        </footer>

        <script type="module" src="js/api.js"></script>
        <script type="module" src="js/ui.js"></script>

        <script type="module">
            import { carregarCardapio } from './js/api.js';
            carregarCardapio();
        </script>
    </div>
</body>

</html>
